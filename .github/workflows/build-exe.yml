name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller & dependencies
        run: pip install pyinstaller openpyxl xlrd python-docx pypdf python-pptx python-calamine

      - name: Install UPX (compression)
        run: choco install upx -y --no-progress

      - name: Build EXE
        run: pyinstaller --onefile --windowed --upx-dir="C:\ProgramData\chocolatey\bin" --name "数据安全检查工具" --add-data "README.md;." DataSafetyScanner.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: DataSafetyScanner
          path: dist/数据安全检查工具.exe
